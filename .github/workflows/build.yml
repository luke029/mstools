name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK (Release 版：无签名，可直接上传安装)
        run: |
          mkdir -p dist/release dist/packages
          python3 scripts/build_apk.py -o dist/release/luci-app-mhtools.apk

      - name: Setup signing & Build signed APK (Feed 版)
        run: |
          echo "${{ secrets.APK_SIGNING_KEY }}" > /tmp/signing.key
          cp scripts/mhtools-signing.pub dist/packages/public.key
          python3 scripts/build_apk.py \
            --sign-key /tmp/signing.key \
            -o dist/packages/luci-app-mhtools.apk

      - name: Generate APKINDEX
        run: python3 scripts/generate_index.py dist/packages/ dist/packages/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.apk
